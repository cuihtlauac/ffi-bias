# ============================================================================
#  Closure-bias probe — Google Gemini (free-tier) configuration.
#  Isolated paths (out_gemini/) so this subject never pools with other runs.
#  Run:  GEMINI_API_KEY in .env, then
#        API_MIN_INTERVAL_S=5 python run_experiment.py --config config.gemini.yaml --plan core
#
#  NOTE: the Gemini free tier is ~20 requests/DAY *per model* (empirically, 2026-06).
#  A full pilot accumulates over several days — just re-run daily; the harness is
#  resumable and recovers any throttled jobs.
# ============================================================================

models:
  - gemini-2.5-flash-lite

api:
  temperature: 0.7          # Gemini accepts temperature; >0 keeps per-cell sampling stochastic
  max_tokens: 4000

sampling:
  n_per_cell: 10
  paraphrases: [p0]
  seed: 17
  max_concurrency: 1        # free tier throttles hard; pace with API_MIN_INTERVAL_S

grid:
  lang:        [ocaml, python, julia, lua, c]
  perf:        [absent, present]
  domain:      [numeric, neutral]
  polars:      [absent, present]
  recognition: [default, offered]
  placebo:     [a, b]

default_plan: core

scoring:
  ocaml_compiler: ocamlfind
  ocaml_timeout_s: 20
  judge_model: gemini-2.5-flash-lite
  judge_on_ocaml_too: false   # OCaml truth is the compiler; judge only the non-OCaml arms

paths:
  raw_dir: ./out_gemini/raw
  scored_csv: ./out_gemini/scored.csv
  analysis_dir: ./out_gemini/analysis
